<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> GitHub Issues Dashboard </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"> </script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!--navbar-->

  <nav class="flex justify-between items-center p-4 bg-white shadow-md">

    <div class="flex items-center gap-2">
    <img src="assets/github-logo.png" class="w-8">
    <span class="font-bold text-lg"> GitHub Issues Tracker </span>

    </div>

    <div class="relative w-full max-w-xs flex items-center gap-2">

    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"> </i>
    <input id="searchInput" type="text" placeholder="Search issues..." class="border p-2 pl-10 rounded">
    <button onclick="searchIssues()" class="bg-[#4A00FF] text-white min-w-[120px] px-4 py-2 rounded hover:bg-[#3a00cc]"> + New Issue </button>

    </div>

  </nav>

  <!--Tabs-->

  <div class="bg-white px-4 py-2 rounded shadow mt-4 mx-6">

    <div class="flex gap-4 mt-4 px-4">

      <button id="AllBtn" class="tab-btn px-3 py-1 rounded" onclick="filterIssues('All')"> All </button>
      <button id="OpenBtn" class="tab-btn px-3 py-1 rounded" onclick="filterIssues('Open')"> Open </button>
      <button id="ClosedBtn" class="tab-btn px-3 py-1 rounded" onclick="filterIssues('Closed')"> Closed </button>

    </div>

  </div>

  <!--issues header-->

  <div class="bg-white p-4 rounded shadow flex flex-col md:flex-row justify-between items-start md:items-center mt-4 mx-6 mb-4" id="issueHeader">
    <div class="flex flex-col md:flex-row md:items-center gap-2">

      <div class="rounded-full overflow-hidden border-4 border-gray-300">
        <img src="assets/Aperture.png" alt="aperture">

      </div>

      <div class="flex flex-col">

        <span class="font-bold text-lg" id="issueCount"> 0 Issues </span>
        <span class="text-gray-500 text-sm"> Track and manage your project issues </span>

      </div>

    </div>

    <div class="flex items-center gap-4 mt-2 md:mt-0 text-sm">

      <span class="flex items-center gap-1">
      <span class="w-3 h-3 rounded-full bg-green-500 inline-block"> </span> Open
      </span>

      <span class="flex items-center gap-1">
        <span class="w-3 h-3 rounded-full bg-purple-500 inline-block"> </span> Closed
      </span>

    </div>
  </div>

  <!--issues container-->

  <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-4 mx-6">
    
  </div>

  <!--modal-->

  <div id="issueModal" class="hidden fixed inset-0 bg-black bg-opacity-50 justify-center items-center z-50">

    <div id="modalContent" class="bg-white p-4 rounded shadow-lg w-96 relative">
    </div>

  </div>

  <script src="dashboard.js"> </script>

</body>

</html>
