<!DOCTYPE html>
<html>
<head>
<title> GitHub Issues Tracker </title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white w-96 p-8 rounded-xl shadow-lg text-center">

<img src="assets\github-logo.png" class="w-14 mx-auto mb-3">
<h1 class="text-2xl font-bold mb-1"> GitHub Issues Tracker </h1>
<p class="text-gray-500 mb-6"> Sign in to manage your issues </p>

<input id="username" class="w-full border p-2 rounded mb-3" placeholder="Enter Username">
<input id="password" type="password" class="w-full border p-2 rounded mb-4" placeholder="Enter Password">
<button onclick="login()" class="w-full bg-[#4A00FF] text-white p-2 rounded hover:bg-[#3a00cc]"> Sign In </button>

<div class="flex items-center my-4">

  <hr class="flex-grow border-gray-300">
  <span class="mx-3 text-black"> OR </span>
  <hr class="flex-grow border-gray-300">

</div>

<div class="text-center space-y-1">

  <p class="text-gray-500 font-semibold"> Demo Credentials: </p>
  <p class="text-gray-700"><span class="font-bold"> Username: </span> admin </p>
  <p class="text-gray-700"><span class="font-bold"> Password: </span> admin123 </p>

</div>

<p id="error" class="text-red-500 mt-2"> </p>

</div>

<script src="script.js"> </script>

</body>

</html>
